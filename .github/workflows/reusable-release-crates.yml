name: Reusable Release Crates

on:
  workflow_call:
    inputs:
      dry_run:
        type: boolean
        description: 'DryRun release'
        required: true
        default: false
      push_tags:
        type: boolean
        description: 'Push tags to repository'
        required: true
        default: true

jobs:
  rust_tests:
    name: Run Rust Tests
    uses: ./.github/workflows/reusable-rust-test.yml
    with:
      # Use separated strategy to check all crates
      cargo-check-strategy: 'separated'

  release_crates:
    environment: crate
    name: Release Crates
    permissions:
      contents: write
      id-token: write
    runs-on: ${{ fromJSON(vars.LINUX_SELF_HOSTED_RUNNER_LABELS ||  '"ubuntu-22.04"') }}
    needs: [rust_tests]
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Install Rust Toolchain
        uses: ./.github/actions/rustup
        with:
          save-if: true
          key: release

      - uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # v1.20.1

      - name: Install cargo-workspaces
        run: cargo binstall --no-confirm cargo-workspaces@0.4.0 --force

      - name: Pnpm Setup
        uses: ./.github/actions/pnpm/setup

      - name: Pnpm Install
        run: pnpm i

      - name: Run Cargo codegen
        run: cargo codegen

      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth

      - name: Publish Crates
        run: |
          ./x crate-publish ${{ inputs.dry_run && '--dry-run' || '' }} ${{ inputs.push_tags && '--push-tags' || '' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
